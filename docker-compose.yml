# ============================================
# 生产环境 Docker Compose 配置
# ============================================
# 使用方式:
#   1. 复制 .env.example 为 .env 并填写配置
#   2. docker compose up -d --build
#   3. docker compose exec app npx prisma migrate deploy
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: grade-tracker-app:latest
    container_name: grade-tracker-app
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/grade_tracker
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o}
      - AI_NAME=${AI_NAME:-AI}
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./prisma:/app/prisma:ro

  db:
    image: postgres:16-alpine
    container_name: grade-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: grade_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: grade-tracker-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: grade-tracker-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

volumes:
  pgdata:
  certbot-conf:
  certbot-www:

networks:
  app-network:
    driver: bridge
